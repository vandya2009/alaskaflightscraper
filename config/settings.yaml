# Date range to search.
# Default: a single date exactly 30 days from today.
search_start_days: 30
search_window_days: 1
search_step_days: 1

# When a specific date is given (interactive prompt or CLI arg), it's expanded
# to that date +/- this many days. E.g. 1 -> 3 dates searched, 3 -> 7 dates.
date_window_days: 1

# Trip details
adults: 1
seat_type: ECONOMY            # ECONOMY, PREMIUM_ECONOMY, BUSINESS, FIRST
max_stops: ANY                # ANY, NON_STOP, ONE_STOP_OR_FEWER, TWO_OR_FEWER_STOPS
exclude_basic_economy: true   # Drop Alaska Saver / AA Basic Economy / etc.

# Filters
min_distance_miles: 1900        # Skip routes shorter than this (great-circle)
record_threshold_cpm: 10.0      # Only record flights with cents-per-mile below this
deal_threshold_cpm: 6.0         # Flights below this also go on the "Best Deals" tab

# Only itineraries flown ENTIRELY by these carriers are kept.
# All listed carriers are bookable directly on alaskaair.com:
# Oneworld members + Alaska's "Earn & Redeem" partners.
allowed_airlines:
  # Oneworld
  - AS    # Alaska Airlines
  - AA    # American Airlines
  - HA    # Hawaiian Airlines
  - BA    # British Airways
  - AY    # Finnair
  - IB    # Iberia
  - CX    # Cathay Pacific
  - FJ    # Fiji Airways
  - JL    # Japan Airlines
  - MH    # Malaysia Airlines
  - QF    # Qantas
  - UL    # SriLankan Airlines
  - WY    # Oman Air
  - QR    # Qatar Airways
  - AT    # Royal Air Maroc
  - RJ    # Royal Jordanian
  # Alaska Earn & Redeem partners (also bookable on alaskaair.com)
  - EI    # Aer Lingus
  - FI    # Icelandair
  - KE    # Korean Air

# How many cheapest qualifying flights to record per (route, date) pair.
top_n_per_search: 1

# Small hand-curated ALLOWLIST: "AIRLINE:DESTINATION" pairs (the carrier
# operating the FINAL leg + destination airport) manually confirmed on
# alaskaair.com to actually return the same itinerary (or a same-carrier,
# similarly-priced one) -- not just some nonzero price, since
# alaska_booking_url is a generic O/D/date search that will almost always
# return *something*, usually on a different carrier/routing than recorded.
#
# This is intentionally an allowlist, not a blocklist: a real spot check of
# 10 partner itineraries (see README) found single_carrier: True predicts
# almost nothing on its own -- only 2 matched (1 exact, 1 close), 8 were
# confirmed substitutions onto a different carrier, INCLUDING two cases of
# American's own metal on long-haul international routes. So the default
# for every partner carrier is now Wrong Carrier; only entries confirmed
# here (or Alaska's own metal -- see src/bookability.py) stay in Results.
# Only add entries you've verified yourself.
known_bookable:
  - "QR:DOH"   # JFK-DOH, QR706 (nonstop), exact match
  - "QR:MCT"   # JFK-MCT, QR706>QR1148 recorded; Alaska showed QR702>QR1124 -- same carrier/route, price within 4%
  - "QR:CMB"   # JFK-CMB, QR706>QR664, Alaska matched at the same/better price
  - "AA:ANC"   # JFK-ANC, AA2369>AA1570, Alaska showed a better price (domestic AA, not the long-haul-international pattern that failed for NRT/SYD)
