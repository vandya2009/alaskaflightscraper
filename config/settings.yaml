# Date range to search.
# Default: a single date exactly 30 days from today.
search_start_days: 30
search_window_days: 1
search_step_days: 1

# When a specific date is given (interactive prompt or CLI arg), it's expanded
# to that date +/- this many days. E.g. 1 -> 3 dates searched, 3 -> 7 dates.
date_window_days: 1

# Trip details
adults: 1
seat_type: ECONOMY            # ECONOMY, PREMIUM_ECONOMY, BUSINESS, FIRST
max_stops: ANY                # ANY, NON_STOP, ONE_STOP_OR_FEWER, TWO_OR_FEWER_STOPS
exclude_basic_economy: true   # Drop Alaska Saver / AA Basic Economy / etc.

# Filters
min_distance_miles: 1900        # Skip routes shorter than this (great-circle)
record_threshold_cpm: 10.0      # Only record flights with cents-per-mile below this
deal_threshold_cpm: 6.0         # Flights below this also go on the "Best Deals" tab

# Only itineraries flown ENTIRELY by these carriers are kept.
# All listed carriers are bookable directly on alaskaair.com:
# Oneworld members + Alaska's "Earn & Redeem" partners.
allowed_airlines:
  # Oneworld
  - AS    # Alaska Airlines
  - AA    # American Airlines
  - HA    # Hawaiian Airlines
  - BA    # British Airways
  - AY    # Finnair
  - IB    # Iberia
  - CX    # Cathay Pacific
  - FJ    # Fiji Airways
  - JL    # Japan Airlines
  - MH    # Malaysia Airlines
  - QF    # Qantas
  - UL    # SriLankan Airlines
  - WY    # Oman Air
  - QR    # Qatar Airways
  - AT    # Royal Air Maroc
  - RJ    # Royal Jordanian
  # Alaska Earn & Redeem partners (also bookable on alaskaair.com)
  - EI    # Aer Lingus
  - FI    # Icelandair
  - KE    # Korean Air

# How many cheapest qualifying flights to record per (route, date) pair.
top_n_per_search: 1

# Small hand-curated blocklist: "AIRLINE:DESTINATION" pairs (the carrier
# operating the FINAL leg + destination airport) that have been manually
# checked on alaskaair.com and confirmed NOT to match -- either zero results,
# or (more common in practice) a nonzero price on a completely different
# carrier/routing than the one recorded, since alaska_booking_url is a
# generic O/D/date search, not itinerary-specific. Regardless of
# single_carrier. Only add entries you've verified yourself; this is not
# inferred from any general rule (see README's booking-link caveat --
# single_carrier: True does NOT imply Alaska interline coverage. A same-day
# spot check found this holds even for American's own metal on long-haul
# international routes -- see AA:NRT / AA:SYD below).
known_unbookable:
  - "JL:KUL"   # JFK-KUL, JL5>JL723, single_carrier: True, 0 Alaska matches
  - "QF:MEL"   # JFK-MEL, AA475>AA2827>QF94, 0 Alaska matches
  - "BA:LHR"   # EWR-LHR, BA184, Alaska substituted EI100>EI152 (Aer Lingus) instead
  - "KE:HKG"   # JFK-HKG, KE86>KE2001, Alaska substituted QR704>QR816 (Qatar) instead
  - "AA:NRT"   # JFK-NRT, AA475>AA61, Alaska substituted QR702>QR808 (Qatar) instead
  - "AA:SYD"   # JFK-SYD, AA302>AA73, Alaska substituted AS2314>QF714 instead
  - "CX:KIX"   # JFK-KIX, CX831>CX566, Alaska substituted AA829 instead
  - "QF:AKL"   # JFK-AKL, QF4 (nonstop), Alaska substituted QR702>QR914 instead
